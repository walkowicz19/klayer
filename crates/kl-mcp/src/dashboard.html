<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>klayer — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas:          #ffffff;
      --soft:            #F0F2F7;
      --hairline:        #E2E8F0;
      --hairline-strong: #CBD5E1;
      --ink:             #1A2742;
      --navy:            #0D1B3E;
      --charcoal:        #3D4F6E;
      --body:            #6B7A99;
      --mute:            #9BA8C0;
      --on-dark:         #ffffff;
      --blue:            #2B6EE8;
      --blue-lt:         #EEF3FD;
      --green:           #1DB87E;
      --amber:           #F59E0B;
      --red:             #EF4444;
      --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-full: 9999px;
    }
    body.dark {
      --canvas:          #0F172A;
      --soft:            #020617;
      --hairline:        #1E293B;
      --hairline-strong: #334155;
      --ink:             #F8FAFC;
      --navy:            #E2E8F0;
      --charcoal:        #94A3B8;
      --body:            #64748B;
      --mute:            #475569;
      --on-dark:         #ffffff;
      --blue:            #3B82F6;
      --blue-lt:         rgba(59, 130, 246, 0.15);
      --green:           #10B981;
      --amber:           #F59E0B;
      --red:             #EF4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Pro Text', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--soft); color: var(--ink); font-size: 14px;
      line-height: 1.5; min-height: 100vh;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 56px 1fr; min-height: 100vh; }

    /* ── Topbar ── */
    .topbar {
      grid-column: 1/-1; background: var(--canvas);
      border-bottom: 1px solid var(--hairline);
      display: flex; align-items: center; padding: 0 20px; gap: 12px;
      position: sticky; top: 0; z-index: 20;
    }
    .logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .logo-word {
      font-family: 'SF Pro Rounded', 'Nunito', system-ui, -apple-system, sans-serif;
      font-size: 18px; font-weight: 700; color: var(--navy); letter-spacing: -0.5px;
    }
    .topbar-divider { width: 1px; height: 20px; background: var(--hairline); margin: 0 4px; }
    .topbar-sub { font-size: 12px; color: var(--mute); }
    .topbar-end { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    /* Language selector */
    .lang-select {
      font-size: 12px; font-weight: 500; color: var(--body);
      background: var(--soft); border: 1px solid var(--hairline);
      border-radius: var(--r-full); padding: 4px 10px; height: 30px;
      cursor: pointer; outline: none; appearance: none;
      -webkit-appearance: none; padding-right: 24px;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239BA8C0' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 8px center;
    }
    .lang-select:focus { border-color: var(--blue); }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--body);
      background: var(--soft); border: 1px solid var(--hairline);
      border-radius: var(--r-full); padding: 0 12px; height: 30px;
      box-sizing: border-box;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mute); flex-shrink: 0; }
    .status-dot.live  { background: var(--green); box-shadow: 0 0 0 2px rgba(29,184,126,.2); }
    .status-dot.error { background: #EF4444; box-shadow: 0 0 0 2px rgba(239,68,68,.2); }

    .refresh-btn {
      font-size: 12px; font-weight: 500; color: var(--on-dark);
      background: var(--navy); border: none; border-radius: var(--r-full);
      padding: 5px 14px; height: 30px; cursor: pointer;
      transition: background .12s; white-space: nowrap;
    }
    .refresh-btn:hover { opacity: 0.9; }
    .refresh-btn.spinning { opacity: .6; pointer-events: none; }

    .theme-toggle-btn {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--hairline); background: var(--soft); color: var(--body);
      border-radius: var(--r-full); cursor: pointer; transition: background .12s, color .12s, border-color .12s;
      padding: 0; flex-shrink: 0;
    }
    .theme-toggle-btn:hover { background: var(--blue-lt); color: var(--blue); border-color: var(--blue); }
    .theme-toggle-btn svg { width: 14px; height: 14px; }

    body.dark .theme-toggle-btn .sun-ico { display: block !important; }
    body.dark .theme-toggle-btn .moon-ico { display: none !important; }
    body:not(.dark) .theme-toggle-btn .sun-ico { display: none !important; }
    body:not(.dark) .theme-toggle-btn .moon-ico { display: block !important; }

    /* Dark mode overrides */
    .logo-mid-bar { fill: var(--navy); }
    body.dark .tn-raw { background: var(--hairline); }
    body.dark .eo-ok   { color: #34d399; background: rgba(52,211,153,.15); }
    body.dark .eo-warn { color: #fbbf24; background: rgba(251,191,36,.15); }
    body.dark .eo-blk  { color: #f87171; background: rgba(248,113,113,.15); }
    body.dark .b-user { color: #34d399; background: rgba(52,211,153,.12); }
    body.dark .b-reviewed { color: #60a5fa; background: rgba(96,165,250,.12); }
    body.dark .b-proposed { color: #fbbf24; background: rgba(251,191,36,.12); }
    body.dark .b-untrusted { color: var(--charcoal); background: var(--hairline); }
    body.dark .kt-rule { color: #60a5fa; background: rgba(96,165,250,.10); }
    body.dark .kt-fact { color: #34d399; background: rgba(52,211,153,.10); }
    body.dark .kt-note { color: var(--charcoal); background: var(--hairline); }

    /* ── Sidebar ── */
    .sidebar { background: var(--canvas); border-right: 1px solid var(--hairline); padding: 16px 0; overflow-y: auto; }
    .nav-group { padding: 0 12px; margin-bottom: 20px; }
    .nav-group-label {
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--mute); padding: 0 8px; margin-bottom: 4px;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 7px 8px; border-radius: var(--r-full); border: none;
      background: none; color: var(--body); font-size: 13px; font-weight: 500;
      cursor: pointer; text-align: left; transition: background .12s, color .12s;
    }
    .nav-btn:hover { background: var(--blue-lt); color: var(--blue); }
    .nav-btn.active { background: var(--navy); color: var(--canvas); }
    .nav-badge {
      margin-left: auto; font-size: 11px; font-weight: 600;
      padding: 1px 7px; border-radius: var(--r-full);
      background: var(--soft); color: var(--mute); border: 1px solid var(--hairline);
    }
    .nav-btn.active .nav-badge { background: rgba(255,255,255,.15); color: rgba(255,255,255,.75); border-color: rgba(255,255,255,.18); }

    /* ── Main ── */
    .main { overflow-y: auto; padding: 28px 32px; }
    .page { display: none; } .page.active { display: block; }
    .ph { margin-bottom: 24px; }
    .ph-title {
      font-family: 'SF Pro Rounded', 'Nunito', system-ui, -apple-system, sans-serif;
      font-size: 22px; font-weight: 700; color: var(--navy); letter-spacing: -0.4px;
    }
    .ph-sub { font-size: 13px; color: var(--body); margin-top: 3px; }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 20px; }
    .stat { background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-lg); padding: 16px 18px; }
    .stat.accent { border-top: 2px solid var(--blue); }
    .stat-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--mute); margin-bottom: 6px; }
    .stat-val { font-family: 'SF Pro Rounded','Nunito',system-ui,sans-serif; font-size: 28px; font-weight: 700; color: var(--navy); letter-spacing: -1.5px; line-height: 1; }
    .stat-hint { font-size: 11px; color: var(--mute); margin-top: 3px; }
    .skeleton { background: var(--hairline); border-radius: 4px; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }

    /* ── Grid ── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; align-items: start; }

    /* ── Card ── */
    .card { background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-lg); overflow: hidden; }
    .card-fw { margin-bottom: 16px; }
    .ch { padding: 13px 18px; border-bottom: 1px solid var(--hairline); display: flex; align-items: center; gap: 8px; }
    .ch-title { font-size: 13px; font-weight: 600; color: var(--navy); }
    .ch-count { margin-left: auto; font-size: 12px; color: var(--mute); }
    .cb { padding: 14px 18px; }

    /* ── Trust flow ── */
    .tflow { display: flex; align-items: stretch; padding: 16px; gap: 4px; }
    .tnode { flex: 1; text-align: center; padding: 14px 8px; border-radius: var(--r-md); }
    .tnode-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; }
    .tnode-val { font-family: 'SF Pro Rounded','Nunito',system-ui,sans-serif; font-size: 26px; font-weight: 700; margin: 4px 0 2px; letter-spacing: -1px; }
    .tnode-sub { font-size: 10px; opacity: .6; }
    .tn-raw  { background: #f0f2f7; } .tn-raw  .tnode-lbl,.tn-raw  .tnode-val { color: var(--body); }
    .tn-prop { background: rgba(245,158,11,.08); } .tn-prop .tnode-lbl,.tn-prop .tnode-val { color: #B45309; }
    .tn-rev  { background: rgba(43,110,232,.08); } .tn-rev  .tnode-lbl,.tn-rev  .tnode-val { color: var(--blue); }
    .tn-usr  { background: rgba(29,184,126,.08); } .tn-usr  .tnode-lbl,.tn-usr  .tnode-val { color: #059669; }
    .tarrow { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 4px; gap: 2px; flex-shrink: 0; }
    .tarrow-lbl { font-size: 9px; color: var(--mute); white-space: nowrap; }
    .tarrow-sym { font-size: 14px; color: var(--hairline-strong); }

    /* ── Domain cards ── */
    .domain-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 12px; margin-bottom: 20px; }
    .dcard { background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-lg); padding: 18px 20px; transition: border-color .15s; }
    .dcard:hover { border-color: var(--hairline-strong); }
    .dcard-name { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .dcard-desc { font-size: 12px; color: var(--body); margin-bottom: 14px; line-height: 1.45; }
    .dcard-row { display: flex; gap: 20px; }
    .dcard-stat-val { font-family: 'SF Pro Rounded','Nunito',system-ui,sans-serif; font-size: 20px; font-weight: 700; color: var(--blue); letter-spacing: -.5px; line-height: 1; }
    .dcard-stat-lbl { font-size: 10px; color: var(--mute); margin-top: 2px; }
    .dbar { margin-top: 14px; height: 2px; border-radius: 2px; background: var(--hairline); overflow: hidden; }
    .dbar-fill { height: 100%; background: var(--blue); border-radius: 2px; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: var(--r-full); font-size: 11px; font-weight: 600; white-space: nowrap; }
    .b-user     { background: rgba(29,184,126,.10); color: #059669; }
    .b-reviewed { background: rgba(43,110,232,.10); color: var(--blue); }
    .b-proposed { background: rgba(245,158,11,.10); color: #B45309; }
    .b-untrusted{ background: #f0f2f7; color: var(--mute); }
    .ktag { display: inline-block; padding: 1px 7px; border-radius: var(--r-sm); font-size: 11px; font-weight: 600; }
    .kt-rule { background: rgba(43,110,232,.08); color: var(--blue); }
    .kt-fact { background: rgba(29,184,126,.08); color: #059669; }
    .kt-note { background: #f0f2f7; color: var(--charcoal); }
    .dtag { font-size: 12px; font-weight: 500; color: var(--blue); }

    /* ── Table ── */
    .tw { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--mute); padding: 9px 16px; border-bottom: 1px solid var(--hairline); background: var(--soft); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--hairline); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--soft); }
    td { padding: 10px 16px; vertical-align: middle; }
    .td-main { font-weight: 600; color: var(--navy); max-width: 300px; }
    .td-dim  { color: var(--mute); font-size: 12px; white-space: nowrap; }

    /* ── Episodes ── */
    .ep-list { display: flex; flex-direction: column; }
    .ep-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--hairline); }
    .ep-item:last-child { border-bottom: none; }
    .ep-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .ep-body { flex: 1; min-width: 0; }
    .ep-action { font-size: 13px; font-weight: 600; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ep-meta { font-size: 11px; color: var(--mute); margin-top: 1px; }
    .ep-out { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--r-full); white-space: nowrap; flex-shrink: 0; }
    .eo-ok   { background: rgba(29,184,126,.10); color: #059669; }
    .eo-warn { background: rgba(245,158,11,.10);  color: #B45309; }
    .eo-blk  { background: rgba(239,68,68,.10);   color: #DC2626; }

    /* ── Sources ── */
    .src-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--hairline); }
    .src-item:last-child { border-bottom: none; }
    .src-icon { width: 28px; height: 28px; border-radius: var(--r-md); background: var(--soft); border: 1px solid var(--hairline); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .src-url { font-size: 12px; font-weight: 600; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px; }
    .src-meta { font-size: 11px; color: var(--mute); margin-top: 1px; }
    .src-end { margin-left: auto; flex-shrink: 0; }

    /* ── Domain glance bars ── */
    .dglance-item { margin-bottom: 12px; }
    .dglance-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .dglance-name { font-size: 13px; font-weight: 600; color: var(--navy); }
    .dglance-hint { font-size: 11px; color: var(--mute); }

    /* ── Promote button ── */
    .promote-btn { font-size: 11px; font-weight: 600; color: var(--on-dark); background: var(--blue); border: none; border-radius: var(--r-full); padding: 3px 10px; cursor: pointer; transition: background .12s; }
    .promote-btn:hover { background: #1f5bc4; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 32px 20px; color: var(--mute); font-size: 13px; }

    /* ── Codebase ── */
    .code-search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .code-search-input {
      flex: 1; height: 36px; padding: 0 12px;
      border: 1px solid var(--hairline); border-radius: var(--r-full);
      font-size: 13px; color: var(--ink); background: var(--canvas);
      outline: none; transition: border-color .12s;
    }
    .code-search-input:focus { border-color: var(--blue); }
    .code-search-btn {
      height: 36px; padding: 0 16px; border-radius: var(--r-full);
      background: var(--navy); color: var(--on-dark); border: none;
      font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap;
      transition: background .12s;
    }
    .code-search-btn:hover { background: #162550; }
    .code-hit { padding: 12px 0; border-bottom: 1px solid var(--hairline); }
    .code-hit:last-child { border-bottom: none; }
    .code-hit-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .code-hit-file { font-size: 12px; font-weight: 600; color: var(--blue); }
    .code-hit-lines { font-size: 11px; color: var(--mute); }
    .code-lang-tag { padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; background: var(--soft); color: var(--charcoal); }
    .code-snippet { font-family: ui-monospace, 'SF Mono', 'Consolas', monospace; font-size: 11.5px; line-height: 1.6; background: var(--soft); border-radius: var(--r-md); padding: 10px 12px; overflow-x: auto; white-space: pre; color: var(--ink); border: 1px solid var(--hairline); max-height: 180px; overflow-y: auto; }
    .repo-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--hairline); }
    .repo-row:last-child { border-bottom: none; }
    .repo-icon { width: 32px; height: 32px; border-radius: var(--r-md); background: var(--soft); border: 1px solid var(--hairline); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .repo-name { font-size: 13px; font-weight: 700; color: var(--navy); }
    .repo-path { font-size: 11px; color: var(--mute); font-family: ui-monospace, 'SF Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 340px; }
    .repo-stats { display: flex; gap: 12px; margin-left: auto; flex-shrink: 0; }
    .repo-stat { text-align: right; }
    .repo-stat-val { font-size: 16px; font-weight: 700; color: var(--blue); line-height: 1; }
    .repo-stat-lbl { font-size: 10px; color: var(--mute); }
    .code-stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }

    /* ── Settings ── */
    .settings-section { margin-bottom: 20px; }
    .settings-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--mute); margin-bottom: 10px; }
    .lang-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 8px; }
    .lang-opt {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 14px; border-radius: var(--r-md);
      border: 1px solid var(--hairline); background: var(--canvas);
      cursor: pointer; font-size: 13px; font-weight: 500; color: var(--body);
      transition: border-color .12s, background .12s; text-align: left;
    }
    .lang-opt:hover { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }
    .lang-opt.active { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); font-weight: 700; }
    .lang-flag { font-size: 18px; line-height: 1; }
    .info-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--hairline); font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-lbl { color: var(--body); }
    .info-val { font-weight: 600; color: var(--navy); font-family: ui-monospace, 'SF Mono', monospace; font-size: 12px; }
    .info-link { color: var(--blue); text-decoration: none; font-weight: 600; font-size: 13px; }
    .info-link:hover { text-decoration: underline; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 3px; }

    .ico { width: 15px; height: 15px; flex-shrink: 0; }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .stats { grid-template-columns: repeat(3,1fr); }
      .g2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Topbar -->
  <header class="topbar">
    <a class="logo" href="#">
      <svg width="26" height="18" viewBox="0 0 26 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0"  y="0"  width="26" height="3.5" rx="1.75" fill="#2B6EE8"/>
        <rect x="3"  y="7"  width="20" height="3.5" rx="1.75" fill="currentColor" class="logo-mid-bar"/>
        <rect x="6"  y="14" width="14" height="3.5" rx="1.75" fill="#2B6EE8" opacity=".55"/>
      </svg>
      <span class="logo-word">klayer</span>
    </a>
    <div class="topbar-divider"></div>
    <span class="topbar-sub" data-i18n="topbarSub"></span>
    <div class="topbar-end">

      <div class="status-pill">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text"></span>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()" data-i18n="btnRefresh"></button>

        <!-- Sun icon (for dark mode -> switch to light) -->

// ── Language state ──────────────────────────────────────────────────────────
let LANG = localStorage.getItem('klayer-lang') || 'en';
const t = key => LANGS[LANG][key] ?? LANGS.en[key] ?? key;

function updateStatusText(text) {
  document.getElementById('status-text').textContent = text;
  const val = document.getElementById('settings-status-val');
  if (val) val.textContent = text;
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('klayer-theme', isDark ? 'dark' : 'light');
}

function applyLang(skipRender = false) {
  document.documentElement.lang = LANG;
  const langSelect = document.getElementById('lang-select');
  if (langSelect) langSelect.value = LANG;
  if (!G.stats) updateStatusText(t('statusConnecting')); // only before first load
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });

  // Render settings language grid
  const langGrid = document.getElementById('lang-grid');
  if (langGrid) {
    const opts = [
      { code: 'en', flag: '🇬🇧', label: 'English' },
      { code: 'pt', flag: '🇧🇷', label: 'Português' },
      { code: 'es', flag: '🇪🇸', label: 'Español' },
      { code: 'zh', flag: '🇨🇳', label: '中文' },
      { code: 'pl', flag: '🇵🇱', label: 'Polski' }
    ];
    langGrid.innerHTML = opts.map(o => `
      <button class="lang-opt${LANG === o.code ? ' active' : ''}" onclick="setLang('${o.code}')">
        <span class="lang-flag">${o.flag}</span>
        <span>${o.label}</span>
      </button>
    `).join('');
  }

  if (G.stats && !skipRender) renderAll();
}

function setLang(code) {
  LANG = code;
  localStorage.setItem('klayer-lang', code);
  applyLang();
}

const trustBadge = v => {
  const c = {user:'b-user',reviewed:'b-reviewed',proposed:'b-proposed',untrusted:'b-untrusted'}[v]||'b-untrusted';
  return `<span class="badge ${c}">${escHtml(v)}</span>`;
};
const kindTag = k => {
  const c = {rule:'kt-rule',fact:'kt-fact',procedure:'kt-note'}[k]||'';
  return `<span class="ktag ${c}">${k}</span>`;
};
const domainTag = d => `<span class="dtag">${escHtml(d)}</span>`;
const outcomeEl = o => {
  const c = {ok:'eo-ok',warn:'eo-warn',blocked:'eo-blk',error:'eo-blk'}[o]||'';
  return `<span class="ep-out ${c}">${o||'—'}</span>`;
};
const dotColor = o => ({ok:'#1DB87E',warn:'#F59E0B',blocked:'#EF4444',error:'#EF4444'}[o]||'#9BA8C0');
const domainIcon = d => ({'clean-code':'📄','cybersecurity':'🔐','design-ui-ux':'🎨','ingest-test':'🧪','mvp-poc':'🚀','sdlc':'⚙️'}[d]||'📄');
const fmtDate = ts => ts ? new Date(ts*1000).toISOString().slice(0,10) : '—';
const fmtTs   = ts => ts ? new Date(ts*1000).toISOString().replace('T',' ').slice(0,16) : '—';

function trustFlowHtml(raw, proposed, reviewed, user) {
  return `
    <div class="tnode tn-raw"><div class="tnode-lbl">${t('tnUntrusted')}</div><div class="tnode-val">${raw}</div><div class="tnode-sub">${t('tnRawIngest')}</div></div>
    <div class="tarrow"><span class="tarrow-lbl">${t('arrowLLM')}</span><span class="tarrow-sym">→</span></div>
    <div class="tnode tn-prop"><div class="tnode-lbl">${t('tnProposed')}</div><div class="tnode-val">${proposed}</div><div class="tnode-sub">${t('tnPending')}</div></div>
    <div class="tarrow"><span class="tarrow-lbl">${t('arrowPromote')}</span><span class="tarrow-sym">→</span></div>
    <div class="tnode tn-rev"><div class="tnode-lbl">${t('tnReviewed')}</div><div class="tnode-val">${reviewed}</div><div class="tnode-sub">${t('tnEnforced')}</div></div>
    <div class="tarrow"><span class="tarrow-lbl">&nbsp;</span><span class="tarrow-sym" style="color:var(--hairline-strong)">·</span></div>
    <div class="tnode tn-usr"><div class="tnode-lbl">${t('tnUser')}</div><div class="tnode-val">${user}</div><div class="tnode-sub">${t('tnAuthored')}</div></div>`;
}

// ── Renderers ────────────────────────────────────────────────────────────────
function renderOverview() {
  const { stats, domains, knowledge, sources, episodes } = G;
  document.getElementById('s-domains').textContent = stats?.domains ?? '—';
  document.getElementById('s-docs').textContent    = stats?.documents ?? '—';
  document.getElementById('s-docs-hint').textContent = t('docsHint')(stats?.domains ?? 0);
  document.getElementById('s-rules').textContent   = stats?.rules ?? '—';
  document.getElementById('s-rules-hint').textContent = t('rulesHint')(stats?.proposed ?? 0);
  document.getElementById('s-eps').textContent     = stats?.episodes ?? '—';
  document.getElementById('s-prefs').textContent   = stats?.preferences ?? '—';

  const proposed = knowledge.filter(k => k.trust==='proposed').length;
  const reviewed  = knowledge.filter(k => k.trust==='reviewed').length;
  const user      = knowledge.filter(k => k.trust==='user').length;
  document.getElementById('tflow-overview').innerHTML = trustFlowHtml(sources.length, proposed, reviewed, user);

  const recent = [...knowledge].slice(0,7);
  document.getElementById('rk-count').textContent = t('total')(knowledge.length);
  document.getElementById('tb-recent').innerHTML = recent.length
    ? recent.map(k => `<tr><td class="td-main">${escHtml(k.title)}</td><td>${domainTag(k.domain)}</td><td>${trustBadge(k.trust)}</td></tr>`).join('')
    : `<tr><td colspan="3" class="empty">${t('emptyKnowledge')}</td></tr>`;

  const maxRules = Math.max(...domains.map(d => d.rule_count), 1);
  document.getElementById('domain-glance').innerHTML = domains.length
    ? domains.map(d => `
        <div class="dglance-item">
          <div class="dglance-row"><span class="dglance-name">${escHtml(d.name)}</span><span class="dglance-hint">${t('rulesCoverage')(d.rule_count, d.doc_count)}</span></div>
          <div class="dbar"><div class="dbar-fill" style="width:${d.rule_count===0?3:Math.round(d.rule_count/maxRules*100)}%"></div></div>
        </div>`).join('')
    : `<div class="empty">${t('emptyDomainsCoverage')}</div>`;

  const recent4 = episodes.slice(0,4);
  document.getElementById('ep-ov-count').textContent = t('total')(episodes.length);
  document.getElementById('ep-overview').innerHTML = recent4.length
    ? recent4.map(e => `
        <div class="ep-item">
          <div class="ep-dot" style="background:${dotColor(e.outcome)}"></div>
          <div class="ep-body">
            <div class="ep-action">${escHtml(e.action||'—')}</div>
            <div class="ep-meta">${e.run_id} · step ${e.step} · <strong>${e.stage||'—'}</strong> · ${fmtTs(e.ts)}</div>
          </div>
          ${outcomeEl(e.outcome)}
        </div>`).join('')
    : `<div class="empty">${t('emptyEpisodes')}</div>`;

  document.getElementById('overview-sub').textContent =
    t('overviewSub')(domains.length, knowledge.length, new Date().toLocaleTimeString());
}

function renderDomains() {
  const { domains } = G;
  const max = Math.max(...domains.map(d => d.rule_count), 1);
  document.getElementById('domain-grid').innerHTML = domains.length
    ? domains.map(d => `
        <div class="dcard">
          <div class="dcard-name">${escHtml(d.name)}</div>
          <div class="dcard-desc">${escHtml(d.description||'—')}</div>
          <div class="dcard-row">
            <div><div class="dcard-stat-val">${d.doc_count}</div><div class="dcard-stat-lbl">${t('dcDocuments')}</div></div>
            <div><div class="dcard-stat-val">${d.rule_count}</div><div class="dcard-stat-lbl">${t('dcRules')}</div></div>
          </div>
          <div class="dbar"><div class="dbar-fill" style="width:${d.rule_count===0?3:Math.round(d.rule_count/max*100)}%"></div></div>
        </div>`).join('')
    : `<div class="empty">${t('emptyDomains')}</div>`;
}

function renderKnowledge() {
  const { knowledge } = G;
  document.getElementById('tb-knowledge').innerHTML = knowledge.length
    ? knowledge.map((k, i) => `
        <tr class="k-row" onclick="toggleKnowledgeDetail(${i})" style="cursor:pointer" title="Click to expand">
          <td class="td-main">${escHtml(k.title)}</td>
          <td>${kindTag(k.kind)}</td>
          <td>${domainTag(k.domain)}</td>
          <td>${trustBadge(k.trust)}</td>
          <td class="td-dim">${fmtDate(k.created_at)}</td>
        </tr>
        <tr id="kd-${i}" style="display:none">
          <td colspan="5" style="padding:.75rem 1.25rem 1rem;background:var(--bg);font-size:.79rem;color:var(--body);white-space:pre-wrap;word-break:break-word;border-bottom:1px solid var(--border);line-height:1.55">${escHtml(k.body||k.content||k.text||'(no body)')}</td>
        </tr>`).join('')
    : `<tr><td colspan="5" class="empty">${t('emptyKnowledge')}</td></tr>`;
}

function toggleKnowledgeDetail(i) {
  const el = document.getElementById('kd-' + i);
  if (el) el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
}

function renderSources() {
  const { sources } = G;
  document.getElementById('sources-list').innerHTML = sources.length
    ? sources.map(s => {
        const uri = s.uri || s.title || '';
        const isUrl = /^https?:\/\//i.test(uri);
        const label = escHtml(uri || '(local file)');
        const urlEl = isUrl
          ? `<a class="src-url" href="${escHtml(uri)}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${label}</a>`
          : `<div class="src-url">${label}</div>`;
        return `
        <div class="src-item">
          <div class="src-icon">${domainIcon(s.domain)}</div>
          <div style="min-width:0;flex:1;">
            ${urlEl}
            <div class="src-meta">${escHtml(s.title||'')} · ${t('ingestedDate')(fmtDate(s.fetched_at))}</div>
          </div>
          <div class="src-end">${domainTag(s.domain)}</div>
        </div>`;}).join('')
    : `<div class="empty">${t('emptySources')}</div>`;
}

function renderEpisodes() {
  const { episodes } = G;
  document.getElementById('ep-all').innerHTML = episodes.length
    ? episodes.map(e => `
        <div class="ep-item">
          <div class="ep-dot" style="background:${dotColor(e.outcome)}"></div>
          <div class="ep-body">
            <div class="ep-action">${escHtml(e.action||'—')}</div>
            <div class="ep-meta">${e.run_id} · step ${e.step} · <strong>${e.stage||'—'}</strong> · ${fmtTs(e.ts)}</div>
          </div>
          ${outcomeEl(e.outcome)}
        </div>`).join('')
    : `<div class="empty">${t('emptyEpisodes')}</div>`;
}

function renderTrust() {
  const { knowledge, sources } = G;
  const proposed = knowledge.filter(k => k.trust==='proposed');
  const reviewed  = knowledge.filter(k => k.trust==='reviewed').length;
  const user      = knowledge.filter(k => k.trust==='user').length;
  document.getElementById('tflow-trust').innerHTML = trustFlowHtml(sources.length, proposed.length, reviewed, user);
  document.getElementById('prop-count').textContent = t('itemsCount')(proposed.length);
  document.getElementById('tb-proposed').innerHTML = proposed.length
    ? proposed.map(k => `
        <tr>
          <td class="td-main">${escHtml(k.title)}</td>
          <td>${domainTag(k.domain)}</td>
          <td>${kindTag(k.kind)}</td>
          <td>${k.severity?`<span class="badge b-proposed">${k.severity}</span>`:'<span class="td-dim">—</span>'}</td>
          <td><button class="promote-btn" onclick="promoteItem(${k.id},this)">${t('promoteBtn')}</button></td>
        </tr>`).join('')
    : `<tr><td colspan="5" class="empty">${t('emptyProposed')}</td></tr>`;
}

function renderCodebase() {
  if (!G.codeStats) return;
  const s = G.codeStats;
  const reposEl  = document.getElementById('cs-repos');
  const filesEl  = document.getElementById('cs-files');
  const chunksEl = document.getElementById('cs-chunks');
  if (reposEl)  reposEl.textContent  = s.repos  ?? 0;
  if (filesEl)  filesEl.textContent  = s.files  ?? 0;
  if (chunksEl) chunksEl.textContent = s.chunks ?? 0;

  const reposCount = document.getElementById('repos-count');
  if (reposCount) reposCount.textContent = G.codeRepos.length;

  const list = document.getElementById('repos-list');
  if (!list) return;
  if (!G.codeRepos.length) {
    list.innerHTML = `<div class="empty" style="padding:1.5rem;text-align:center;color:var(--muted)">—</div>`;
    return;
  }
  list.innerHTML = G.codeRepos.map(r => `
    <div class="repo-row">
      <span class="repo-icon">⬡</span>
      <div style="flex:1;min-width:0">
        <div class="repo-name">${escHtml(r.name)}</div>
        <div class="repo-path">${escHtml(r.path)}</div>
      </div>
      <div class="repo-stats">
        <span>${r.file_count} ${t('repoFiles')}</span>
        <span>${r.chunk_count} ${t('repoChunks')}</span>
        <span>${t('repoIndexed')} ${r.indexed_at ? r.indexed_at.slice(0,10) : '—'}</span>
      </div>
    </div>`).join('');
}

function renderSettings() {
  const portEl = document.getElementById('settings-port-val');
  if (portEl) portEl.textContent = window.location.port || '80';
  const urlEl = document.getElementById('settings-url-val');
  if (urlEl) { urlEl.textContent = window.location.origin; urlEl.href = window.location.origin; }
}

function renderAll() {
  document.getElementById('nb-domains').textContent   = G.domains.length;
  document.getElementById('nb-knowledge').textContent = G.knowledge.length;
  document.getElementById('nb-sources').textContent   = G.sources.length;
  document.getElementById('nb-episodes').textContent  = G.episodes.length;
  document.getElementById('nb-repos').textContent     = G.codeRepos.length;
  applyLang(true);
  renderOverview(); renderDomains(); renderKnowledge();
  renderSources(); renderEpisodes(); renderTrust();
  renderCodebase(); renderSettings();
}

// ── API ──────────────────────────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  btn.textContent = t('btnLoading');
  try {
    const ok = v => v.status === 'fulfilled' ? v.value : null;
    const [stats, domains, knowledge, sources, episodes, preferences, codeStats, codeRepos] =
      (await Promise.allSettled([
        fetch('/api/stats').then(r=>r.json()),
        fetch('/api/domains').then(r=>r.json()),
        fetch('/api/knowledge').then(r=>r.json()),
        fetch('/api/sources').then(r=>r.json()),
        fetch('/api/episodes').then(r=>r.json()),
        fetch('/api/preferences').then(r=>r.json()),
        fetch('/api/code/stats').then(r=>r.json()),
        fetch('/api/code/repos').then(r=>r.json()),
      ])).map(ok);
    const live = !!stats;
    G = {
      stats:       stats      ?? G.stats,
      domains:     domains    ?? G.domains,
      knowledge:   knowledge  ?? G.knowledge,
      sources:     sources    ?? G.sources,
      episodes:    episodes   ?? G.episodes,
      preferences: preferences ?? G.preferences,
      codeStats:   codeStats  ?? G.codeStats,
      codeRepos:   codeRepos  ?? G.codeRepos,
    };
    const dot = document.getElementById('status-dot');
    dot.style.background = '';
    dot.classList.toggle('live',  live);
    dot.classList.toggle('error', !live);
    updateStatusText(t(live ? 'statusLive' : 'statusError'));
    if (live) { try { renderAll(); } catch(re) { console.error('render error:', re); } }
  } catch(e) {
    const dot = document.getElementById('status-dot');
    dot.classList.remove('live');
    dot.classList.add('error');
    updateStatusText(t('statusError'));
    console.error('klayer fetch error:', e);
  } finally {
    btn.classList.remove('spinning');
    btn.textContent = t('btnRefresh');
  }
}

async function clearCodebase() {
  if (!confirm('Clear ALL indexed codebase memory? This cannot be undone.')) return;
  try {
    const r = await fetch('/api/code/clear').then(res => res.json());
    if (r.ok) { await loadData(); }
    else alert('Clear failed: ' + (r.error || 'unknown error'));
  } catch(e) { alert('Clear failed: ' + e); }
}

async function clearDomains() {
  const answer = prompt(t('domainsClearWarning'));
  if (answer === null) return;
  if (answer.trim().toLowerCase() !== 'delete') { alert('Cancelled — you must type "delete" exactly.'); return; }
  try {
    const r = await fetch('/api/domains/clear').then(res => res.json());
    if (r.ok) { await loadData(); }
    else alert('Clear failed: ' + (r.error || 'unknown error'));
  } catch(e) { alert('Clear failed: ' + e); }
}

async function clearKnowledge() {
  if (!confirm('Clear ALL knowledge items across every domain? This cannot be undone.')) return;
  try {
    const r = await fetch('/api/knowledge/clear').then(res => res.json());
    if (r.ok) { await loadData(); }
    else alert('Clear failed: ' + (r.error || 'unknown error'));
  } catch(e) { alert('Clear failed: ' + e); }
}

async function clearSources() {
  if (!confirm('Clear ALL ingested sources and chunks across every domain? This cannot be undone.')) return;
  try {
    const r = await fetch('/api/sources/clear').then(res => res.json());
    if (r.ok) { await loadData(); }
    else alert('Clear failed: ' + (r.error || 'unknown error'));
  } catch(e) { alert('Clear failed: ' + e); }
}

async function clearEpisodes() {
  if (!confirm('Clear ALL episodes from the audit trail? This cannot be undone.')) return;
  try {
    const r = await fetch('/api/episodes/clear').then(res => res.json());
    if (r.ok) { await loadData(); }
    else alert('Clear failed: ' + (r.error || 'unknown error'));
  } catch(e) { alert('Clear failed: ' + e); }
}

async function runCodeSearch() {
  const query = document.getElementById('code-search-input').value.trim();
  const results = document.getElementById('code-search-results');
  if (!results) return;
  if (!query) { results.innerHTML = `<div class="empty" style="padding:1rem;text-align:center;color:var(--muted)">${t('codeSearchPrompt')}</div>`; return; }
  results.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--muted)">…</div>';
  try {
    const hits = await fetch(`/api/code/search?q=${encodeURIComponent(query)}&limit=20`).then(r=>r.json());
    if (!hits.length) {
      results.innerHTML = `<div class="empty" style="padding:1rem;text-align:center;color:var(--muted)">${t('codeNoResults')}</div>`;
      return;
    }
    results.innerHTML = hits.map(h => `
      <div class="code-hit">
        <div class="code-hit-header">
          <span class="code-hit-file">${escHtml(h.rel_path)}</span>
          ${h.symbol_name ? `<span class="code-hit-file" style="opacity:.7">${escHtml(h.symbol_name)}</span>` : ''}
          <span class="code-lang-tag">${escHtml(h.language || '')}</span>
          <span style="font-size:.72rem;color:var(--muted);margin-left:auto">${escHtml(h.repo_name || '')}</span>
        </div>
        <pre class="code-snippet">${escHtml(h.snippet || h.content || '')}</pre>
      </div>`).join('');
  } catch(e) {
    results.innerHTML = `<div class="empty" style="padding:1rem;color:var(--danger)">${escHtml(String(e))}</div>`;
  }
}

document.getElementById('code-search-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') runCodeSearch();
});

async function promoteItem(id, btn) {
  btn.disabled = true; btn.textContent = '…';
  try { alert(`promote(${id})\n\nRun this MCP tool call in your Claude client to promote this item to 'reviewed'.`); }
  finally { btn.disabled = false; btn.textContent = t('promoteBtn'); }
}

// ── Navigation ───────────────────────────────────────────────────────────────
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.toggle('active', p.id === 'page-' + pageId);
  });
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === pageId);
  });
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    showPage(btn.dataset.page);
  });
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────────────────────────
const currentTheme = localStorage.getItem('klayer-theme') || 'light';
if (currentTheme === 'dark') {
  document.body.classList.add('dark');
}
applyLang();
loadData();
</script>
